    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f4f7fc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
            margin: 0;
        }

        .cart-card {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 36px 36px 32px 32px;
            box-shadow: 0 25px 50px -10px rgba(0, 20, 50, 0.15);
            overflow: hidden;
            padding: 28px 24px 32px 24px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 32px);
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 2.3rem);
            font-weight: 650;
            color: #11212e;
            letter-spacing: -0.02em;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 16px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .btn {
            background: white;
            border: 1px solid #b7ceec;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 570;
            color: #1f4a7a;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.15s;
            box-shadow: 0 4px 10px rgba(0, 30, 60, 0.04);
        }

        .btn:hover {
            background: #dfebf9;
            border-color: #7f9fd0;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #1f3f60;
            border-color: #1f3f60;
            color: white;
            box-shadow: 0 8px 16px rgba(20, 60, 120, 0.2);
        }

        .btn-primary:hover {
            background: #143450;
            border-color: #0f2840;
        }

        .summary-btn-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 28px;
            flex-shrink: 0;
        }

        .table-wrapper {
            flex: 1;
            overflow-x: auto;
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
        }

        .cart-table thead {
            background: transparent;
        }

        .cart-table th {
            text-align: left;
            padding: 14px 8px 14px 0;
            font-weight: 540;
            color: #3b5777;
            border-bottom: 2px solid #dde5f0;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .cart-table td {
            padding: 20px 8px 20px 0;
            border-bottom: 1px solid #e5ecf5;
            vertical-align: middle;
        }

        .cart-table th:last-child,
        .cart-table td:last-child {
            text-align: right;
            padding-right: 0;
        }

        .product-cell {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 180px;
        }

        .product-name {
            font-weight: 650;
            color: #0e2a40;
            font-size: 1rem;
            line-height: 1.3;
            max-width: 280px;
        }

        .product-img {
            width: 100px;
            height: 100px;
            background: #ecf2f9;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0, 25, 60, 0.08);
            border: 1px solid #d0ddee;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .price, .subtotal {
            font-weight: 600;
            color: #1c3c5e;
            font-size: 1.15rem;
        }

        .subtotal {
            color: #124064;
        }

        .quantity-control {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f6faff;
            border-radius: 60px;
            padding: 6px 8px;
            border: 1px solid #c6d6f0;
        }

        .qty-btn {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            border: none;
            background: white;
            color: #1b3b60;
            font-size: 2rem;
            font-weight: 300;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            border: 1px solid #c9d6ea;
            transition: 0.1s ease;
            line-height: 1;
        }

        .qty-btn:hover {
            background: #e3efff;
            border-color: #8aa9d1;
        }

        .qty-btn:active {
            background: #c7dbfa;
            transform: scale(0.92);
        }

        .qty-number {
            min-width: 40px;
            text-align: center;
            font-weight: 650;
            font-size: 1.5rem;
            color: #0c2943;
        }

        .total-row td {
            border-bottom: none;
            padding-top: 30px;
            padding-bottom: 6px;
        }

        .grand-total {
            text-align: right;
            font-size: clamp(1.6rem, 5vw, 2rem);
            font-weight: 700;
            color: #003057;
        }

        .grand-total span {
            background: #e0ebf9;
            padding: 10px 28px;
            border-radius: 60px;
            display: inline-block;
            box-shadow: 0 6px 16px rgba(0, 40, 80, 0.1);
        }

        .footer-note {
            text-align: center;
            color: #6c89aa;
            font-size: 0.9rem;
            margin-top: 32px;
            border-top: 1px dashed #d0deef;
            padding-top: 24px;
            flex-shrink: 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 36px;
            padding: 32px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 1px solid #d0ddee;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #dde5f0;
        }

        .modal-header h2 {
            color: #11212e;
            font-weight: 650;
            font-size: 1.8rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 32px;
            cursor: pointer;
            color: #6c89aa;
            line-height: 1;
            padding: 0 8px;
        }

        .close-btn:hover {
            color: #1f3f60;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        .summary-table th {
            text-align: left;
            padding: 12px 0;
            color: #3b5777;
            border-bottom: 2px solid #dde5f0;
            font-weight: 540;
        }

        .summary-table td {
            padding: 16px 0;
            border-bottom: 1px solid #e5ecf5;
            vertical-align: middle;
        }

        .summary-table td:last-child,
        .summary-table th:last-child {
            text-align: right;
        }

        .summary-product {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .summary-product-img {
            width: 50px;
            height: 50px;
            background: #ecf2f9;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #d0ddee;
            flex-shrink: 0;
        }

        .summary-product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .summary-product-name {
            font-weight: 500;
            color: #0e2a40;
            font-size: 0.9rem;
        }

        .summary-total {
            text-align: right;
            padding: 20px 0 8px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #003057;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px dashed #d0deef;
        }

            background: #1f3f60;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.15s;
        }

        .capture-btn:hover {
            background: #143450;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(20, 60, 120, 0.2);
        }

        #captureContainer {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 700px;
            background: white;
            border-radius: 36px;
            padding: 32px;
            z-index: -1;
        }

        .no-items-message {
            text-align: center;
            padding: 40px 20px;
            color: #6c89aa;
            font-size: 1.2rem;
            font-style: italic;
        }

        @media screen and (max-width: 700px) {
            .cart-card {
                padding: 20px 16px;
            }
            .cart-table thead {
                display: none;
            }
            .cart-table tbody tr {
                display: block;
                background: #fbfdff;
                border-radius: 28px;
                padding: 20px 18px;
                margin-bottom: 24px;
                border: 1px solid #dde6f2;
            }
            .cart-table td {
                display: block;
                width: 100% !important;
                padding: 8px 0 !important;
                border-bottom: none;
                text-align: left !important;
            }
            .product-cell {
                flex-direction: column;
                align-items: flex-start;
            }
            .price::before {
                content: "💰 單價：";
                font-weight: 430;
                color: #4f6f94;
                margin-right: 6px;
            }
            .subtotal {
                font-size: 1.3rem;
                background: #e9f0fa;
                padding: 10px 16px;
                border-radius: 60px;
                display: inline-block;
            }
            .subtotal::before {
                content: "🧾 小計 ";
                font-weight: 440;
                color: #21537c;
            }
            .grand-total span::before {
                content: "全部總計  ";
                font-size: 1.3rem;
                font-weight: 500;
                color: #234e7c;
            }
            .modal-content {
                padding: 24px 20px;
                width: 95%;
            }
            .product-name {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

            { id: 'p42', name: '雙葵牌 餐桌鹽 454GM', price: 7, imageUrl: 'https://img.rtacdn-os.com/20240306/31f59552-8a07-3ff1-9ed8-84f22a69516a' },
            { id: 'p43', name: '太古純正砂糖 400GM', price: 7, imageUrl: 'https://img.rtacdn-os.com/20251218/8f1d588d-9ae2-3421-99c5-c16872784e0b' },
            { id: 'p44', name: '唯潔雅珍寶200衛生紙', price: 39, imageUrl: 'https://img.rtacdn-os.com/20250704/994ba1b2-5cf3-3b69-ae1c-3662b93f3d07' },
            { id: 'p45', name: '原箱維達4D立體壓花4層衛生紙27卷裝', price: 73, imageUrl: 'https://img.rtacdn-os.com/20260206/92c2030f-a11c-3d6b-a081-8d58b7caf753' },
            { id: 'p46', name: 'DARLIE 牙膏牙膏孖裝 175GM', price: 28, imageUrl: 'https://img.rtacdn-os.com/20260127/e33b09e6-355c-3502-81a1-925e84af854b' },
            { id: 'p47', name: '高露潔防蛀薄荷味牙膏 200克 x 3支', price: 44, imageUrl: 'https://img.rtacdn-os.com/20250905/5c23780c-69db-36ce-92b1-ee2162c59cb9' },
            { id: 'p48', name: '斧頭牌檸檬洗潔精補充裝 1.3KG', price: 19, imageUrl: 'https://img.rtacdn-os.com/20250407/3ce670c3-b5d3-3706-851f-6195a5c15935' },
            { id: 'p49', name: '勞工牌檸檬洗潔精 2LT', price: 23, imageUrl: 'https://img.rtacdn-os.com/20210510/31f19f2e-7466-434b-87e7-53394dec748f' },
            { id: 'p50', name: '佳能保鮮紙300呎', price: 31, imageUrl: 'https://img.rtacdn-os.com/20260109/443a3f11-3012-3253-b2eb-40fb3d7acadb' }
        ];

        // 初始化所有商品數量為0
        let quantities = {};
        products.forEach(p => { quantities[p.id] = 0; });

        const tbody = document.getElementById('cartBody');
        const grandTotalSpan = document.querySelector('#grandTotalDisplay span');
        const modal = document.getElementById('summaryModal');
        const showBtn = document.getElementById('showSummaryBtn');
        const closeBtn = document.getElementById('closeSummaryBtn');
        const summaryItems = document.getElementById('summaryItems');
        const summaryTotal = document.getElementById('summaryTotal');
        const captureContainer = document.getElementById('captureContainer');

        function calculateTotal() {
            let totalInCents = 0;
            products.forEach(p => {
                const qty = quantities[p.id] || 0;
                if (qty > 0) {
                    totalInCents += Math.round(p.price * 100) * qty;
                }
            });
            return totalInCents / 100;
        }

        function calculateSubtotal(price, qty) {
            const subtotalInCents = Math.round(price * 100) * qty;
            return subtotalInCents / 100;
        }

        function refreshQuantitiesAndTotal() {
            products.forEach(p => {
                const qty = quantities[p.id] || 0;
                const qtySpan = document.getElementById(`qty_${p.id}`);
                if (qtySpan) qtySpan.innerText = qty;

                const subSpan = document.getElementById(`subtotal_${p.id}`);
                if (subSpan) {
                    const subtotal = calculateSubtotal(p.price, qty);
                    subSpan.innerText = `$HK ${subtotal.toFixed(2)}`;
                }
            });

            const total = calculateTotal();
            if (grandTotalSpan) grandTotalSpan.innerText = `$HK ${total.toFixed(2)}`;
        }

        window.increase = (pid) => {
            quantities[pid] += 1;
            refreshQuantitiesAndTotal();
        };
        
        window.decrease = (pid) => {
            if (quantities[pid] > 0) {
                quantities[pid] -= 1;
                refreshQuantitiesAndTotal();
            }
        };

        function renderTable() {
            let htmlRows = '';
            products.forEach(p => {
                const q = quantities[p.id] || 0;
                const subtotal = calculateSubtotal(p.price, q);
                htmlRows += `<tr>
                    <td>
                        <div class="product-cell">
                            <span class="product-name">${escapeHtml(p.name)}</span>
                            <div class="product-img">
                                <img src="${p.imageUrl}" alt="${escapeHtml(p.name)}" loading="lazy" crossorigin="anonymous" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27100%27 height=%27100%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 fill=%27%23ecf2f9%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 dominant-baseline=%27middle%27 text-anchor=%27middle%27 fill=%27%238aa9cf%27 font-size=%2712%27%3E📦%3C/text%3E%3C/svg%3E';">
                            </div>
                        </div>
                    </td>
                    <td class="price">$HK ${p.price.toFixed(2)}</td>
                    <td>
                        <div class="quantity-control">
                            <button class="qty-btn" onclick="decrease('${p.id}')">−</button>
                            <span class="qty-number" id="qty_${p.id}">${q}</span>
                            <button class="qty-btn" onclick="increase('${p.id}')">+</button>
                        </div>
                    </td>
                    <td class="subtotal" id="subtotal_${p.id}">$HK ${subtotal.toFixed(2)}</td>
                </tr>`;
            });
            tbody.innerHTML = htmlRows;
            const total = calculateTotal();
            if (grandTotalSpan) grandTotalSpan.innerText = `$HK ${total.toFixed(2)}`;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        renderTable();

        function updateSummary() {
            let html = '';
            let total = 0;
            let hasItems = false;
            
            products.forEach(p => {
                const qty = quantities[p.id] || 0;
                if (qty > 0) {
                    hasItems = true;
                    const subtotal = calculateSubtotal(p.price, qty);
                    total += subtotal;
                    
                    html += `<tr>
                        <td>
                            <div class="summary-product">
                                <div class="summary-product-img">
                                    <img src="${p.imageUrl}" alt="${escapeHtml(p.name)}" crossorigin="anonymous" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2750%27 height=%2750%27 viewBox=%270 0 50 50%27%3E%3Crect width=%2750%27 height=%2750%27 fill=%27%23ecf2f9%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 dominant-baseline=%27middle%27 text-anchor=%27middle%27 fill=%27%238aa9cf%27 font-size=%2712%27%3E📦%3C/text%3E%3C/svg%3E';">
                                </div>
                                <span class="summary-product-name">${escapeHtml(p.name)}</span>
                            </div>
                        </td>
                        <td>$HK ${p.price.toFixed(2)}</td>
                        <td>${qty}</td>
                        <td style="font-weight: 600;">$HK ${subtotal.toFixed(2)}</td>
                    </tr>`;
                }
            });
            
            if (!hasItems) {
                html = `<tr><td colspan="4" class="no-items-message">🛒 購物車沒有商品</td></tr>`;
                total = 0;
            }
            
            summaryItems.innerHTML = html;
            summaryTotal.textContent = `$HK ${total.toFixed(2)}`;
        }

        showBtn.addEventListener('click', () => {
            updateSummary();
            modal.style.display = 'flex';
        });

        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });

        document.getElementById('captureSummaryBtn').addEventListener('click', async function() {
            try {
                let itemsHtml = '';
                let total = 0;
                
                products.forEach(p => {
                    const qty = quantities[p.id] || 0;
                    if (qty > 0) {
                        const subtotal = calculateSubtotal(p.price, qty);
                        total += subtotal;
                        
                        itemsHtml += `
                            <tr>
                                <td style="padding: 16px 0; border-bottom: 1px solid #e5ecf5;">
                                    <div style="display: flex; align-items: center; gap: 12px;">
                                        <div style="width: 50px; height: 50px; background: #ecf2f9; border-radius: 12px; overflow: hidden; border: 1px solid #d0ddee;">
                                            <img src="${p.imageUrl}" alt="${escapeHtml(p.name)}" style="width: 100%; height: 100%; object-fit: cover;" crossorigin="anonymous" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2750%27 height=%2750%27 viewBox=%270 0 50 50%27%3E%3Crect width=%2750%27 height=%2750%27 fill=%27%23ecf2f9%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 dominant-baseline=%27middle%27 text-anchor=%27middle%27 fill=%27%238aa9cf%27 font-size=%2712%27%3E📦%3C/text%3E%3C/svg%3E';">
                                        </div>
                                        <span style="font-weight: 500; color: #0e2a40;">${escapeHtml(p.name)}</span>
                                    </div>
                                </td>
                                <td style="padding: 16px 0; border-bottom: 1px solid #e5ecf5; text-align: center;">$HK ${p.price.toFixed(2)}</td>
                                <td style="padding: 16px 0; border-bottom: 1px solid #e5ecf5; text-align: center;">${qty}</td>
                                <td style="padding: 16px 0; border-bottom: 1px solid #e5ecf5; text-align: right; font-weight: 600;">$HK ${subtotal.toFixed(2)}</td>
                            </tr>
                        `;
                    }
                });
                
                if (itemsHtml === '') {
                    itemsHtml = `<tr><td colspan="4" style="text-align: center; padding: 40px 20px; color: #6c89aa; font-size: 1.2rem;">🛒 購物車沒有商品</td></tr>`;
                }
                
                captureContainer.innerHTML = `
                    <div style="background: white; font-family: 'Inter', sans-serif; width: 100%;">
                        <div style="border-bottom: 2px solid #dde5f0; padding-bottom: 16px; margin-bottom: 24px;">
                            <h2 style="color: #11212e; font-size: 1.8rem; margin: 0;">🛒 訂單摘要</h2>
                            <p style="color: #6c89aa; margin-top: 8px;">佛教黃允畋中學2026</p>
                        </div>
                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 24px;">
                            <thead>
                                <tr style="border-bottom: 2px solid #dde5f0;">
                                    <th style="text-align: left; padding: 12px 0; color: #3b5777;">商品</th>
                                    <th style="text-align: center; padding: 12px 0; color: #3b5777;">單價</th>
                                    <th style="text-align: center; padding: 12px 0; color: #3b5777;">數量</th>
                                    <th style="text-align: right; padding: 12px 0; color: #3b5777;">小計</th>
                                </tr>
                            </thead>
                            <tbody>${itemsHtml}</tbody>
                        </table>
                        <div style="text-align: right; padding: 20px 0 8px; font-size: 1.5rem; font-weight: 700; color: #003057;">
                            $HK ${total.toFixed(2)}
                        </div>
                        <div style="margin-top: 24px; padding-top: 20px; border-top: 1px dashed #d0deef; text-align: center; color: #6c89aa; font-size: 0.9rem;">
                            佛教黃允畋中學2026
                        </div>
                    </div>
                `;

                const images = captureContainer.querySelectorAll('img');
                await Promise.all(Array.from(images).map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(resolve => {
                        img.onload = resolve;
                        img.onerror = resolve;
                    });
                }));
                
                await new Promise(r => setTimeout(r, 200));

                const canvas = await html2canvas(captureContainer, {
                    scale: 2.5,
                    backgroundColor: '#ffffff',
                    useCORS: true,
                    logging: false
                });

                const link = document.createElement('a');
                link.download = `訂單摘要_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();

                captureContainer.innerHTML = '';
                
            } catch (error) {
                alert('截圖失敗：' + error);
                console.error(error);
                captureContainer.innerHTML = '';
            }
        });
    })();
</script>
